<!doctype html>
<html lang="ja">
  <head>

    <link rel="icon" href="images/p-newfavison (1).png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    style="
      background: linear-gradient(135deg, #b5eefd 0%, #ffd1f1 100%);
      min-height: 100vh;
    "
  >
    <header class="poppin-page-header">
      <a href="index.html">
        <img
          src="images/expedition.png"
          alt="POPPIN'"
          class="header-logo-image"
        />

    <main style="max-width: 1000px; margin: 0 auto; padding: 20px">
      <!-- 💡 導入メッセージ：敷居をガッツリ下げて共感を生む言葉 -->
      <div
        class="concept-section"
        style="text-align: center; margin-bottom: 40px"
      >
        <p class="concept-subtitle" style="color: #ff71ce; font-weight: bold">
          #Join the Adventure
        </p>
        <h2 class="concept-title" style="font-size: 28px; margin-bottom: 15px">
          日常を無気力に流されないために。
        </h2>
        <p
          class="concept-text"
          style="font-size: 14px; line-height: 1.8; color: #333"
        >
          大きな海外旅行じゃなくていい、仕事を辞めなくたっていい。<br />
          「週末にあのアトリエに行ってみたい」「明日はカラフルなお洋服を着てみたい」<br />
          そんな、あなたの胸の奥にある<b>ささやかなワクワク</b>を、ここにこっそり置いていきませんか？<br />
          一人だと消えちゃいそうなときめきの灯火を、みんなで持ち寄るポップ秘密基地♡
        </p>
      </div>

      <!-- 💡 【ここを修正！】Padlet埋め込みエリア -->
      <section style="margin-bottom: 50px">
        <div
          class="padlet-wrapper"
          style="
            border: 3px solid #000;
            border-radius: 16px;
            box-shadow: 6px 6px 0px #000;
            overflow: hidden;
            background: white;

        >
          <!-- 📥 👇ここにPadletでコピーした「魔法のコード」をそのまま貼り付けてね！ 👇 -->

          <div
            class="padlet-embed"
            style="

              border-radius: 2px;
              box-sizing: border-box;
              overflow: hidden;
              position: relative;
              width: 100%;
              background: #f4f4f4;
            "
          >
            <p style="padding: 0; margin: 0">
              <iframe
                src="https://padlet.com/embed/srpt2eic9yjtzsh6"
                frameborder="0"
                allow="
                  camera;
                  microphone;
                  geolocation;
                  display-capture;
                  clipboard-write;

                style="

                  height: 608px;
                  display: block;
                  padding: 0;
                  margin: 0;

          <!-- 📤 👆ここまで 👆 -->
        </div>
